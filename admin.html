<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#070707" />
    <title>Panel admina — AI Brand Agency</title>
    <link rel="icon" type="image/png" href="photo/LOGO pl glow.png" />
    <link rel="apple-touch-icon" href="photo/LOGO pl glow.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="admin.js" defer></script>
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section class="admin-login" data-admin-login>
        <div class="login-card">
          <a class="brand" href="index.html" aria-label="Wróć na stronę główną">
            <img class="brand-logo" src="photo/LOGO pl glow.png" alt="" />
            <span>AI Brand<br />Agency</span>
          </a>
          <p class="section-index">Admin / Supabase</p>
          <h1>Panel zarządzania stroną</h1>
          <p>Zaloguj się kontem utworzonym w Supabase Auth, żeby edytować treści i zarządzać leadami.</p>

          <form class="admin-form" data-login-form>
            <label>
              <span>Email</span>
              <input type="email" name="email" autocomplete="email" required placeholder="admin@email.com" />
            </label>
            <label>
              <span>Hasło</span>
              <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
            </label>
            <button class="button button-accent" type="submit">Zaloguj się <span aria-hidden="true">↗</span></button>
            <button class="button button-ghost demo-login-button" type="button" data-demo-login>Wejdź w trybie demo (Mock DB)</button>
            <p class="admin-status" role="status" data-login-status></p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
